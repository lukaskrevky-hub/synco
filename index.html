<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synco - absolutní kino</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-app: #09090b;
    --bg-panel: #18181b;
    --bg-hover: #27272a;
    --border: #27272a;
    
    --purple: #9333ea;
    --purple-hover: #a855f7;
    --purple-glow: rgba(147, 51, 234, 0.15);
    
    --teal: #2dd4bf;
    --teal-bg: rgba(45, 212, 191, 0.1);
    
    --red: #fb7185;
    --red-bg: rgba(251, 113, 133, 0.1);
    
    --text-main: #f8fafc;
    --text-muted: #a1a1aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--bg-app); 
    color: var(--text-main); 
    font-family: 'Outfit', sans-serif; 
    min-height: 100vh; 
    overflow-y: auto; 
    overflow-x: hidden; 
  }
  
  .toolbar { background: var(--bg-panel); margin: 15px 15px 0 15px; padding: 12px 20px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 10; }
  .logo { font-size: 20px; font-weight: 700; color: var(--text-main); letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--purple); }
  
  .group { display: flex; gap: 10px; align-items: center; }
  .group-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  
  input { background: var(--bg-app); border: 1px solid var(--border); color: var(--text-main); padding: 10px 14px; border-radius: 8px; flex: 1; outline: none; font-family: inherit; transition: 0.2s; }
  input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-glow); }
  input[readonly] { background: var(--bg-hover); color: var(--purple-hover); cursor: copy; font-weight: 500; }
  
  /* Zpět na fialová tlačítka pro hlavní akce */
  button { background: var(--purple); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit; transition: 0.2s; white-space: nowrap; }
  button:hover { background: var(--purple-hover); transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button.secondary { background: var(--bg-hover); color: var(--text-main); border: 1px solid var(--border); }
  button.secondary:hover { background: #3f3f46; border-color: #52525b; }
  
  .status { font-size: 13px; padding: 8px 14px; border-radius: 8px; background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .status::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
  .status.connected { background: var(--teal-bg); color: var(--teal); border-color: rgba(45, 212, 191, 0.2); }
  .status.connected::before { background: var(--teal); box-shadow: 0 0 8px var(--teal); }
  .status.error { background: var(--red-bg); color: var(--red); border-color: rgba(251, 113, 133, 0.2); }
  .status.error::before { background: var(--red); box-shadow: 0 0 8px var(--red); }
  
  .main-area { display: flex; padding: 15px; gap: 15px; max-width: 1800px; margin: 0 auto; align-items: flex-start; }
  
  .left-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; }
  
  .video-container { width: 100%; aspect-ratio: 16 / 9; position: relative; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05); }
  .player-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; visibility: hidden; opacity: 0; transition: opacity 0.3s ease; }
  .player-layer.active { z-index: 2; visibility: visible; opacity: 1; }
  video { width: 100%; height: 100%; outline: none; background: #000; }
  iframe { width: 100%; height: 100%; border: none; background: #000; }

  .comments-container { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px; display: none; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .comments-container.active { display: flex; }
  
  .comments-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); border-radius: 16px 16px 0 0; }
  .comments-header span { font-weight: 700; color: var(--text-main); font-size: 16px; }
  
  .comments-list { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  
  .comment { display: flex; gap: 15px; font-size: 14px; line-height: 1.5; }
  .comment img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .comment-content { flex: 1; min-width: 0; }
  .comment-author { font-weight: 700; color: var(--purple-hover); margin-right: 10px; }
  .comment-date { color: var(--text-muted); font-size: 12px; }
  .comment-text { color: var(--text-main); margin-top: 6px; word-break: break-word; }
  .comment-system { color: var(--text-muted); text-align: center; font-style: italic; padding: 20px 0; }

  .playlist-panel { width: 360px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.2); flex-shrink: 0; position: sticky; top: 15px; height: calc(100vh - 100px); }
  .playlist-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
  .playlist-header span { font-weight: 700; color: var(--text-main); font-size: 16px; }
  .playlist-header .count { background: var(--purple-glow); color: var(--purple-hover); padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 700; }
  
  /* Přidáno overscroll-behavior pro uzamčení scrollování uvnitř fronty */
  .playlist-items { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; overscroll-behavior: contain; }
  .playlist-items::-webkit-scrollbar { width: 6px; }
  .playlist-items::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }
  
  .playlist-item { background: var(--bg-app); border: 1px solid var(--border); padding: 8px; border-radius: 10px; cursor: grab; transition: all 0.2s ease; position: relative; display: flex; gap: 12px; align-items: center; padding-right: 40px; }
  .playlist-item:active { cursor: grabbing; }
  .playlist-item:hover { border-color: #3f3f46; transform: translateX(2px); }
  .playlist-item.active { border-color: var(--purple); background: var(--purple-glow); }
  
  .playlist-item.dragging { opacity: 0.4; border: 1px dashed var(--teal); background: var(--bg-hover); transform: scale(0.98); }
  .playlist-item.drag-over-top { border-top: 2px solid var(--teal); }
  .playlist-item.drag-over-bottom { border-bottom: 2px solid var(--teal); }
  
  .playlist-thumb { width: 90px; height: 50px; background: var(--bg-hover); border-radius: 6px; background-size: cover; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05); }
  .playlist-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
  .playlist-title { font-size: 14px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
  .playlist-url { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
  
  .btn-remove { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; font-size: 18px; background: none; border: none; padding: 0; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; transition: 0.2s; }
  .btn-remove:hover { background: var(--red-bg); color: var(--red); }

  #start-overlay { position: fixed; inset: 0; background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .start-box { background: var(--bg-panel); border: 1px solid var(--border); padding: 50px 40px; border-radius: 20px; text-align: center; max-width: 440px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  .start-box .icon { font-size: 40px; margin-bottom: 15px; display: inline-block; background: var(--teal-bg); width: 80px; height: 80px; line-height: 80px; border-radius: 50%; color: var(--teal); }
  .start-box h2 { color: var(--text-main); margin-bottom: 15px; font-size: 26px; }
  .start-box p { color: var(--text-muted); font-size: 15px; margin-bottom: 30px; line-height: 1.6; }
  .start-box button { font-size: 18px; padding: 14px 24px; width: 100%; border-radius: 12px; }
  #room-name-display { color: var(--purple-hover); font-weight: 700; padding: 2px 6px; background: var(--purple-glow); border-radius: 6px; }
</style>
</head>
<body>

<div id="start-overlay">
  <div class="start-box">
    <div class="icon">🍿</div>
    <h2>Vítej v Synco</h2>
    <p>Připojuješ se do místnosti <span id="room-name-display"></span>. Kliknutím níže aktivuješ kino režim a synchronizaci.</p>
    <button onclick="startApp()">Vstoupit do kina</button>
  </div>
</div>

<div class="toolbar">
  <div class="logo">Synco<span>.</span></div>

  <div class="group" style="flex: 0 1 auto; margin-left: 10px;">
    <span class="group-label">Pozvánka:</span>
    <input type="text" id="invite-link" readonly onclick="this.select()" style="width: 420px;" title="Kliknutím zkopíruješ">
    <button class="secondary" onclick="copyLink()" id="copy-btn">Kopírovat</button>
  </div>
  
  <div class="group" style="flex: 0 1 auto;">
    <span class="group-label">API Klíč:</span>
    <input type="password" id="yt-api-key" placeholder="Vlož klíč..." style="width: 130px;">
    <button class="secondary" onclick="saveApiKeyAndFetch()">Uložit</button>
  </div>
  
  <div class="group" style="flex: 1; min-width: 300px;">
    <input type="text" id="url-input" placeholder="YouTube nebo Kick odkaz...">
    <button class="secondary" onclick="handleMediaAction('queue')">+ Do fronty</button>
    <button onclick="handleMediaAction('play')">Pustit</button>
  </div>
  
  <div class="group" style="flex: 0; margin-left: auto;">
    <div id="conn-status" class="status">Čekám...</div>
  </div>
</div>

<div class="main-area">
  <div class="left-panel">
    <div class="video-container">
      <div id="layer-yt" class="player-layer"><div id="yt-player"></div></div>
      <div id="layer-kick" class="player-layer"><video id="kick-player" controls></video></div>
    </div>
    
    <div class="comments-container" id="comments-section">
      <div class="comments-header">
        <span>YouTube Komentáře <span id="comments-count" style="color:var(--text-muted); font-weight:normal; font-size:13px; margin-left:8px;"></span></span>
      </div>
      <div class="comments-list" id="comments-list">
        <div class="comment-system">Pro zobrazení komentářů zadej API klíč nahoře v liště a spusť YouTube video. Pokud ho zadá parťák, uvidíš komentáře automaticky.</div>
      </div>
    </div>
  </div>
  
  <div class="playlist-panel">
    <div class="playlist-header">
      <span>Fronta videí</span>
      <span class="count" id="playlist-count">0</span>
    </div>
    <div class="playlist-items" id="playlist-items"></div>
  </div>
</div>

<script>
  document.addEventListener('contextmenu', event => event.preventDefault());
  document.onkeydown = function(e) {
    if(e.keyCode == 123) return false;
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
    if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
  }

  const params = new URLSearchParams(window.location.search);
  let roomName = params.get('room');
  if (!roomName) {
    roomName = Math.random().toString(36).substring(2, 8);
    window.history.replaceState(null, '', '?room=' + roomName);
  }

  document.getElementById('room-name-display').innerText = roomName;
  document.getElementById('invite-link').value = window.location.href;

  const storageKey = 'synco-data-' + roomName;
  let playlist = []; 
  let currentYtId = null;

  const savedKey = localStorage.getItem('synco_yt_api_key');
  if (savedKey) {
    document.getElementById('yt-api-key').value = savedKey;
  }

  function loadLocalData() {
    const data = localStorage.getItem(storageKey);
    if (data) {
      const parsed = JSON.parse(data);
      if (parsed.playlist) {
        playlist = parsed.playlist.map(item => {
          if (typeof item === 'string') {
            const ytMatch = item.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            if (ytMatch) return { url: item, title: 'Uložené YouTube video', thumb: `https://img.youtube.com/vi/${ytMatch[1]}/mqdefault.jpg` };
            return { url: item, title: 'Stream', thumb: '' };
          }
          return item;
        });
      }
      if (parsed.url) document.getElementById('url-input').value = parsed.url;
    }
    renderPlaylist();
  }

  function saveLocalData() {
    localStorage.setItem(storageKey, JSON.stringify({
      url: document.getElementById('url-input').value.trim(),
      playlist: playlist
    }));
  }

  function saveApiKeyAndFetch() {
    const key = document.getElementById('yt-api-key').value.trim();
    if (key) {
      localStorage.setItem('synco_yt_api_key', key);
      if (currentMode === 'yt' && currentYtId) {
        fetchAndShareComments();
      }
    }
  }

  async function fetchMetadata(url) {
    const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
    if (ytMatch) {
      const id = ytMatch[1];
      const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
      let title = "YouTube Video";
      try {
        const res = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        if (data.title) title = data.title;
      } catch(e) {}
      return { url, title, thumb };
    } else {
      return { url, title: "Streamované vysílání", thumb: "" }; 
    }
  }

  let peer = null, conn = null, isSyncing = false, syncTimeout = null;
  let currentMode = 'none', ytPlayer = null, ytReady = false, ytLastTime = 0;
  const kickVideo = document.getElementById('kick-player');
  let hls = null;

  const peerConfig = { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }, { urls: 'stun:stun.cloudflare.com:3478' }] } };

  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1 },
      events: { 'onReady': () => { ytReady = true; }, 'onStateChange': onYtStateChange }
    });
  };

  function updateStatus(text, type = '') {
    const el = document.getElementById('conn-status');
    el.innerText = text;
    el.className = 'status ' + type;
  }

  function startApp() {
    document.getElementById('start-overlay').style.display = 'none';
    updateStatus('Vytvářím místnost...');
    
    loadLocalData();

    const hostId = 'synco-room-' + roomName;
    peer = new Peer(hostId, peerConfig);

    peer.on('open', (id) => {
      updateStatus('Čekám na parťáka...');
      if (document.getElementById('url-input').value.trim()) loadMedia(false);
    });

    peer.on('connection', (c) => {
      setupConnection(c);
      setTimeout(() => {
        const currentUrl = document.getElementById('url-input').value.trim();
        const t = currentMode === 'yt' ? (ytReady ? ytPlayer.getCurrentTime() : 0) : kickVideo.currentTime;
        const isPlaying = currentMode === 'yt' ? (ytReady && ytPlayer.getPlayerState() === 1) : !kickVideo.paused;
        sendSync({ action: 'init', url: currentUrl, time: t, playing: isPlaying, playlist: playlist });
      }, 500);
    });

    peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        updateStatus('Připojuji do kina...');
        let guestPeer = new Peer(undefined, peerConfig);
        guestPeer.on('open', () => {
          const c = guestPeer.connect(hostId, { reliable: true });
          setupConnection(c);
          c.on('error', () => { updateStatus('Chyba spojení', 'error'); });
        });
      }
    });
  }

  function setupConnection(c) {
    if (conn) conn.close();
    conn = c;
    conn.on('open', () => { updateStatus('Propojeno', 'connected'); });
    conn.on('data', handleSyncData);
    conn.on('close', () => { updateStatus('Parťák odpojen', 'error'); });
  }

  function sendSync(data) { if (conn && conn.open && !isSyncing) conn.send(data); }

  function copyLink() {
    const linkInput = document.getElementById('invite-link');
    linkInput.select();
    navigator.clipboard.writeText(linkInput.value);
    document.getElementById('copy-btn').innerText = '✓ Zkopírováno';
    setTimeout(() => document.getElementById('copy-btn').innerText = 'Kopírovat', 2000);
  }

  function handleSyncData(data) {
    isSyncing = true;
    clearTimeout(syncTimeout);

    if (data.action === 'init') {
      document.getElementById('url-input').value = data.url;
      if (data.playlist) { playlist = data.playlist; saveLocalData(); renderPlaylist(); }
      if (data.url) loadMedia(false); 
      
      setTimeout(() => {
        if (currentMode === 'yt' && ytReady) { ytPlayer.seekTo(data.time, true); if (data.playing) ytPlayer.playVideo(); else ytPlayer.pauseVideo(); } 
        else if (currentMode === 'kick') { kickVideo.currentTime = data.time; if (data.playing) kickVideo.play(); else kickVideo.pause(); }
      }, 1500);
      syncTimeout = setTimeout(() => { isSyncing = false; }, 3000);
      return;
    }

    if (data.action === 'load') { document.getElementById('url-input').value = data.url; loadMedia(false); syncTimeout = setTimeout(() => { isSyncing = false; }, 2000); return; }
    
    if (data.action === 'queue_add') {
      if (!playlist.some(i => i.url === data.item.url)) { playlist.push(data.item); saveLocalData(); renderPlaylist(); }
      syncTimeout = setTimeout(() => { isSyncing = false; }, 300); return; 
    }
    
    if (data.action === 'queue_remove') { removeFromPlaylist(data.url, false); syncTimeout = setTimeout(() => { isSyncing = false; }, 300); return; }

    if (data.action === 'queue_reorder') {
      playlist = data.playlist;
      saveLocalData();
      renderPlaylist();
      syncTimeout = setTimeout(() => { isSyncing = false; }, 300);
      return;
    }

    if (data.action === 'comments_data') {
      renderComments(data.items, data.totalResults);
      syncTimeout = setTimeout(() => { isSyncing = false; }, 300); return;
    }

    if (currentMode === 'yt' && ytReady) {
      if (data.action === 'play') { ytPlayer.seekTo(data.time, true); ytPlayer.playVideo(); }
      else if (data.action === 'pause') { ytPlayer.seekTo(data.time, true); ytPlayer.pauseVideo(); }
      else if (data.action === 'seek') { ytPlayer.seekTo(data.time, true); }
    }
    if (currentMode === 'kick') {
      if (data.action === 'play') { kickVideo.currentTime = data.time; kickVideo.play(); }
      else if (data.action === 'pause') { kickVideo.currentTime = data.time; kickVideo.pause(); }
      else if (data.action === 'seek') { kickVideo.currentTime = data.time; }
    }

    syncTimeout = setTimeout(() => { isSyncing = false; }, 400);
  }

  async function handleMediaAction(action) {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    
    if (action === 'play') {
      await addToPlaylist(url, true);
      loadMedia(true);
    } else if (action === 'queue') {
      await addToPlaylist(url, true);
      document.getElementById('url-input').value = '';
    }
  }

  async function addToPlaylist(url, broadcast = false) {
    if (!playlist.some(item => item.url === url)) {
      const newItem = await fetchMetadata(url);
      playlist.push(newItem);
      saveLocalData();
      renderPlaylist();
      if (broadcast) sendSync({ action: 'queue_add', item: newItem });
    }
  }

  function removeFromPlaylist(url, broadcast = false) {
    playlist = playlist.filter(item => item.url !== url);
    saveLocalData();
    renderPlaylist();
    if (broadcast) sendSync({ action: 'queue_remove', url: url });
  }

  function renderPlaylist() {
    const container = document.getElementById('playlist-items');
    document.getElementById('playlist-count').innerText = playlist.length;
    container.innerHTML = '';
    const currentUrl = document.getElementById('url-input').value.trim();

    playlist.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'playlist-item' + (item.url === currentUrl ? ' active' : '');
      div.draggable = true; 
      
      const thumbDiv = document.createElement('div');
      thumbDiv.className = 'playlist-thumb';
      if (item.thumb) { thumbDiv.style.backgroundImage = `url('${item.thumb}')`; } 
      else { thumbDiv.innerText = 'STREAM'; }

      const infoDiv = document.createElement('div');
      infoDiv.className = 'playlist-info';
      
      const titleSpan = document.createElement('span');
      titleSpan.className = 'playlist-title';
      titleSpan.innerText = item.title;
      
      const urlSpan = document.createElement('span');
      urlSpan.className = 'playlist-url';
      urlSpan.innerText = item.url.length > 40 ? item.url.substring(0, 40) + '...' : item.url;
      
      infoDiv.appendChild(titleSpan);
      infoDiv.appendChild(urlSpan);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'btn-remove';
      removeBtn.innerHTML = '✕';
      removeBtn.onclick = (e) => { e.stopPropagation(); removeFromPlaylist(item.url, true); };

      div.appendChild(thumbDiv);
      div.appendChild(infoDiv);
      div.appendChild(removeBtn);

      div.addEventListener('dragstart', (e) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index);
        setTimeout(() => div.classList.add('dragging'), 0);
      });

      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
        document.querySelectorAll('.playlist-item').forEach(el => {
          el.classList.remove('drag-over-top');
          el.classList.remove('drag-over-bottom');
        });
      });

      div.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const bounding = div.getBoundingClientRect();
        const offset = bounding.y + (bounding.height / 2);
        if (e.clientY - offset > 0) {
          div.classList.add('drag-over-bottom');
          div.classList.remove('drag-over-top');
        } else {
          div.classList.add('drag-over-top');
          div.classList.remove('drag-over-bottom');
        }
      });

      div.addEventListener('dragleave', () => {
        div.classList.remove('drag-over-top');
        div.classList.remove('drag-over-bottom');
      });

      div.addEventListener('drop', (e) => {
        e.preventDefault();
        div.classList.remove('drag-over-top');
        div.classList.remove('drag-over-bottom');
        
        const draggedIdx = parseInt(e.dataTransfer.getData('text/plain'));
        if (isNaN(draggedIdx) || draggedIdx === index) return;

        const bounding = div.getBoundingClientRect();
        const offset = bounding.y + (bounding.height / 2);
        let dropIndex = index;
        
        if (e.clientY - offset > 0) {
          dropIndex++;
        }
        if (draggedIdx < dropIndex) {
          dropIndex--;
        }

        const [movedItem] = playlist.splice(draggedIdx, 1);
        playlist.splice(dropIndex, 0, movedItem);

        saveLocalData();
        renderPlaylist();
        sendSync({ action: 'queue_reorder', playlist: playlist });
      });

      div.onclick = () => { document.getElementById('url-input').value = item.url; loadMedia(true); };
      
      container.appendChild(div);
    });
  }

  function loadMedia(broadcast = false) {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    saveLocalData();
    renderPlaylist(); 

    if (broadcast) sendSync({ action: 'load', url: url });

    const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);

    if (ytMatch && ytReady) {
      currentMode = 'yt';
      currentYtId = ytMatch[1];
      document.getElementById('layer-kick').classList.remove('active');
      document.getElementById('layer-yt').classList.add('active');
      document.getElementById('comments-section').classList.add('active');
      
      if (hls) { hls.destroy(); kickVideo.pause(); }
      ytPlayer.loadVideoById(currentYtId);
      
      fetchAndShareComments();

    } else if (url.endsWith('.m3u8')) {
      currentMode = 'kick';
      currentYtId = null;
      document.getElementById('layer-yt').classList.remove('active');
      document.getElementById('layer-kick').classList.add('active');
      document.getElementById('comments-section').classList.remove('active');
      
      if (ytReady) ytPlayer.pauseVideo();

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(kickVideo);
        hls.on(Hls.Events.MANIFEST_PARSED, () => kickVideo.play());
      } else if (kickVideo.canPlayType('application/vnd.apple.mpegurl')) {
        kickVideo.src = url;
        kickVideo.play();
      }
    }
  }

  async function fetchAndShareComments() {
    const apiKey = localStorage.getItem('synco_yt_api_key');
    const list = document.getElementById('comments-list');
    
    if (!apiKey) {
      list.innerHTML = '<div class="comment-system">Pro zobrazení komentářů zadej API klíč nahoře v liště. Pokud ho zadá parťák a pustí video, uvidíš komentáře automaticky.</div>';
      return;
    }
    if (!currentYtId) return;

    list.innerHTML = '<div class="comment-system">Načítám komentáře...</div>';
    
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${currentYtId}&maxResults=50&order=relevance&key=${apiKey}`);
      const data = await res.json();
      
      if (data.error) { 
        list.innerHTML = `<div class="comment-system" style="color:var(--red)">Chyba API: ${data.error.message}</div>`; 
        return; 
      }
      
      const snippets = data.items.map(i => i.snippet.topLevelComment.snippet);
      renderComments(snippets, data.pageInfo?.totalResults);
      
      if (conn && conn.open) {
        sendSync({ action: 'comments_data', items: snippets, totalResults: data.pageInfo?.totalResults });
      }
      
    } catch(e) {
      list.innerHTML = '<div class="comment-system" style="color:var(--red)">Nepodařilo se načíst komentáře. Zkontroluj klíč.</div>';
    }
  }

  function renderComments(snippets, totalResults) {
    const list = document.getElementById('comments-list');
    document.getElementById('comments-count').innerText = totalResults ? `(${totalResults})` : '';
    
    if (!snippets || snippets.length === 0) {
      list.innerHTML = '<div class="comment-system">Tohle video nemá žádné komentáře.</div>';
      return;
    }

    list.innerHTML = '';
    snippets.forEach(c => {
      const div = document.createElement('div');
      div.className = 'comment';
      
      const d = Math.floor((Date.now() - new Date(c.publishedAt)) / 864e5);
      const timeStr = d === 0 ? 'dnes' : (d === 1 ? 'včera' : `${d} dní zpět`);

      div.innerHTML = `
        <img src="${c.authorProfileImageUrl || ''}" onerror="this.style.display='none'">
        <div class="comment-content">
          <div><span class="comment-author">${c.authorDisplayName}</span><span class="comment-date">${timeStr}</span></div>
          <div class="comment-text">${c.textDisplay}</div>
        </div>
      `;
      list.appendChild(div);
    });
  }

  kickVideo.addEventListener('play', () => sendSync({ action: 'play', time: kickVideo.currentTime }));
  kickVideo.addEventListener('pause', () => sendSync({ action: 'pause', time: kickVideo.currentTime }));
  kickVideo.addEventListener('seeked', () => sendSync({ action: 'seek', time: kickVideo.currentTime }));

  function onYtStateChange(event) {
    if (isSyncing) return;
    const time = ytPlayer.getCurrentTime();
    if (event.data === YT.PlayerState.PLAYING) sendSync({ action: 'play', time: time });
    else if (event.data === YT.PlayerState.PAUSED) sendSync({ action: 'pause', time: time });
  }

  setInterval(() => {
    if (currentMode === 'yt' && ytReady && !isSyncing) {
      const state = ytPlayer.getPlayerState();
      const currentTime = ytPlayer.getCurrentTime();
      if (Math.abs(currentTime - ytLastTime) > 1.5 && (state === YT.PlayerState.PLAYING || state === YT.PlayerState.PAUSED)) {
        sendSync({ action: 'seek', time: currentTime });
      }
      ytLastTime = currentTime;
    }
  }, 500);

</script>
