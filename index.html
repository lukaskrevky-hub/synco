<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synco - Naše Kino</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1215; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  /* Horní panel */
  .toolbar { background: #161b20; padding: 15px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #242c34; z-index: 10; }
  .group { display: flex; gap: 10px; align-items: center; flex: 1; min-width: 250px; }
  input { background: #080a0c; border: 1px solid #242c34; color: #fff; padding: 8px 12px; border-radius: 6px; flex: 1; outline: none; }
  input:focus { border-color: #5b8dee; }
  input[readonly] { background: #1e252c; color: #7ba4f2; cursor: copy; }
  
  button { background: #5b8dee; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; white-space: nowrap; }
  button:hover { background: #7ba4f2; }
  button.secondary { background: #3d4d5a; }
  button.secondary:hover { background: #4b5f6f; }
  
  .status { font-size: 14px; padding: 6px 10px; border-radius: 4px; background: #3d4d5a; white-space: nowrap; }
  .status.connected { background: #4ade80; color: #0d2318; font-weight: bold; }
  .status.error { background: #f87171; color: #230d0d; font-weight: bold; }
  
  /* Rozložení: Video + Playlist */
  .main-area { display: flex; flex: 1; min-height: 0; }
  
  .video-container { flex: 1; position: relative; background: #000; min-width: 0; }
  .player-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; visibility: hidden; opacity: 0; transition: opacity 0.2s; }
  .player-layer.active { z-index: 2; visibility: visible; opacity: 1; }
  video { width: 100%; height: 100%; outline: none; }
  iframe { width: 100%; height: 100%; border: none; }

  /* Playlist na pravé straně */
  .playlist-panel { width: 340px; background: #161b20; border-left: 1px solid #242c34; display: flex; flex-direction: column; }
  .playlist-header { padding: 15px; border-bottom: 1px solid #242c34; font-weight: bold; color: #7ba4f2; display: flex; justify-content: space-between; align-items: center;}
  .playlist-items { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  
  /* Nový vzhled položky ve frontě */
  .playlist-item { background: #080a0c; border: 1px solid #242c34; padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; display: flex; gap: 10px; align-items: center; padding-right: 35px; }
  .playlist-item:hover { border-color: #5b8dee; background: #0f1215; }
  .playlist-item.active { border-color: #4ade80; background: #0d2318; }
  
  .playlist-thumb { width: 80px; height: 45px; background: #1e252c; border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #7d8c99; }
  .playlist-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .playlist-title { font-size: 13px; font-weight: bold; color: #dde3ea; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .playlist-url { font-size: 11px; color: #7d8c99; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .btn-remove { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #f87171; cursor: pointer; font-weight: bold; font-size: 16px; background: none; border: none; padding: 0; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 4px; }
  .btn-remove:hover { background: #230d0d; }

  /* Úvodní obrazovka */
  #start-overlay { position: absolute; inset: 0; background: #0f1215; z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .start-box { background: #161b20; border: 1px solid #242c34; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }
  .start-box h2 { color: #5b8dee; margin-bottom: 10px; }
  .start-box p { color: #7d8c99; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
  .start-box button { font-size: 18px; padding: 12px 24px; width: 100%; }
</style>
</head>
<body>

<div id="start-overlay">
  <div class="start-box">
    <h2>Synco Místnost</h2>
    <p>Identifikátor: <strong id="room-name-display" style="color: #fff;"></strong></p>
    <p>Kliknutím vstoupíš do místnosti a aktivuješ synchronizaci.</p>
    <button onclick="startApp()">Vstoupit do místnosti</button>
  </div>
</div>

<div class="toolbar">
  <div class="group">
    <span style="font-size: 13px; color: #7d8c99;">Odkaz:</span>
    <input type="text" id="invite-link" readonly onclick="this.select()">
    <button onclick="copyLink()" id="copy-btn">Kopírovat</button>
  </div>
  
  <div class="group">
    <input type="text" id="url-input" placeholder="YouTube nebo Kick (.m3u8)">
    <button class="secondary" onclick="handleMediaAction('queue')">Do fronty</button>
    <button onclick="handleMediaAction('play')">Hned pustit</button>
  </div>
  
  <div class="group" style="flex: 0;">
    <div id="conn-status" class="status">Čekám...</div>
  </div>
</div>

<div class="main-area">
  <div class="video-container">
    <div id="layer-yt" class="player-layer"><div id="yt-player"></div></div>
    <div id="layer-kick" class="player-layer"><video id="kick-player" controls></video></div>
  </div>
  
  <div class="playlist-panel">
    <div class="playlist-header">
      <span>Fronta videí</span>
    </div>
    <div class="playlist-items" id="playlist-items">
      </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  let roomName = params.get('room');
  if (!roomName) {
    roomName = Math.random().toString(36).substring(2, 8);
    window.history.replaceState(null, '', '?room=' + roomName);
  }

  document.getElementById('room-name-display').innerText = roomName;
  document.getElementById('invite-link').value = window.location.href;

  const storageKey = 'synco-data-' + roomName;
  let playlist = []; 
  // Struktura playlistu: [{ url: "...", title: "...", thumb: "..." }]

  function loadLocalData() {
    const data = localStorage.getItem(storageKey);
    if (data) {
      const parsed = JSON.parse(data);
      if (parsed.playlist) {
        // Zpětná kompatibilita pro staré textové odkazy
        playlist = parsed.playlist.map(item => {
          if (typeof item === 'string') return { url: item, title: 'Uložené video', thumb: '' };
          return item;
        });
      }
      if (parsed.url) document.getElementById('url-input').value = parsed.url;
    }
    renderPlaylist();
  }

  function saveLocalData() {
    localStorage.setItem(storageKey, JSON.stringify({
      url: document.getElementById('url-input').value.trim(),
      playlist: playlist
    }));
  }

  // Funkce pro získání názvu a náhledu z odkazu
  async function fetchMetadata(url) {
    const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
    
    if (ytMatch) {
      const id = ytMatch[1];
      const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
      let title = "YouTube Video";
      
      try {
        // Skvělý veřejný nástroj na zjištění názvu YouTube videa zdarma a bez klíče
        const res = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        if (data.title) title = data.title;
      } catch(e) { console.error("Nelze načíst název YT", e); }
      
      return { url, title, thumb };
    } else {
      // Je to Kick stream nebo jiný formát
      return { url, title: "Streamované vysílání", thumb: "" }; 
    }
  }

  let peer = null, conn = null, isSyncing = false, syncTimeout = null;
  let currentMode = 'none', ytPlayer = null, ytReady = false, ytLastTime = 0;
  const kickVideo = document.getElementById('kick-player');
  let hls = null;

  const peerConfig = { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }, { urls: 'stun:stun.cloudflare.com:3478' }] } };

  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
      events: { 'onReady': () => { ytReady = true; }, 'onStateChange': onYtStateChange }
    });
  };

  function startApp() {
    document.getElementById('start-overlay').style.display = 'none';
    document.getElementById('conn-status').innerText = 'Vytvářím místnost...';
    
    loadLocalData();

    const hostId = 'synco-room-' + roomName;
    peer = new Peer(hostId, peerConfig);

    peer.on('open', (id) => {
      document.getElementById('conn-status').innerText = 'Čekám na parťáka...';
      if (document.getElementById('url-input').value.trim()) loadMedia(false);
    });

    peer.on('connection', (c) => {
      setupConnection(c);
      
      setTimeout(() => {
        const currentUrl = document.getElementById('url-input').value.trim();
        const t = currentMode === 'yt' ? (ytReady ? ytPlayer.getCurrentTime() : 0) : kickVideo.currentTime;
        const isPlaying = currentMode === 'yt' ? (ytReady && ytPlayer.getPlayerState() === 1) : !kickVideo.paused;
        
        sendSync({ action: 'init', url: currentUrl, time: t, playing: isPlaying, playlist: playlist });
      }, 500);
    });

    peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        document.getElementById('conn-status').innerText = 'Připojuji se do místnosti...';
        let guestPeer = new Peer(undefined, peerConfig);
        guestPeer.on('open', () => {
          const c = guestPeer.connect(hostId, { reliable: true });
          setupConnection(c);
          c.on('error', () => { document.getElementById('conn-status').className = 'status error'; document.getElementById('conn-status').innerText = 'Chyba!'; });
        });
      }
    });
  }

  function setupConnection(c) {
    if (conn) conn.close();
    conn = c;
    conn.on('open', () => { document.getElementById('conn-status').className = 'status connected'; document.getElementById('conn-status').innerText = 'Propojeno s parťákem'; });
    conn.on('data', handleSyncData);
    conn.on('close', () => { document.getElementById('conn-status').className = 'status error'; document.getElementById('conn-status').innerText = 'Parťák se odpojil'; });
  }

  function sendSync(data) { if (conn && conn.open && !isSyncing) conn.send(data); }

  function copyLink() {
    const linkInput = document.getElementById('invite-link');
    linkInput.select();
    navigator.clipboard.writeText(linkInput.value);
    document.getElementById('copy-btn').innerText = 'Zkopírováno!';
    setTimeout(() => document.getElementById('copy-btn').innerText = 'Kopírovat', 2000);
  }

  function handleSyncData(data) {
    isSyncing = true;
    clearTimeout(syncTimeout);

    if (data.action === 'init') {
      document.getElementById('url-input').value = data.url;
      if (data.playlist) { playlist = data.playlist; saveLocalData(); renderPlaylist(); }
      if (data.url) loadMedia(false); 
      
      setTimeout(() => {
        if (currentMode === 'yt' && ytReady) { ytPlayer.seekTo(data.time, true); if (data.playing) ytPlayer.playVideo(); else ytPlayer.pauseVideo(); } 
        else if (currentMode === 'kick') { kickVideo.currentTime = data.time; if (data.playing) kickVideo.play(); else kickVideo.pause(); }
      }, 1500);
      syncTimeout = setTimeout(() => { isSyncing = false; }, 3000);
      return;
    }

    if (data.action === 'load') { document.getElementById('url-input').value = data.url; loadMedia(false); syncTimeout = setTimeout(() => { isSyncing = false; }, 2000); return; }
    
    if (data.action === 'queue_add') {
      if (!playlist.some(i => i.url === data.item.url)) {
        playlist.push(data.item);
        saveLocalData(); renderPlaylist();
      }
      syncTimeout = setTimeout(() => { isSyncing = false; }, 300); return; 
    }
    
    if (data.action === 'queue_remove') { removeFromPlaylist(data.url, false); syncTimeout = setTimeout(() => { isSyncing = false; }, 300); return; }

    if (currentMode === 'yt' && ytReady) {
      if (data.action === 'play') { ytPlayer.seekTo(data.time, true); ytPlayer.playVideo(); }
      else if (data.action === 'pause') { ytPlayer.seekTo(data.time, true); ytPlayer.pauseVideo(); }
      else if (data.action === 'seek') { ytPlayer.seekTo(data.time, true); }
    }
    
    if (currentMode === 'kick') {
      if (data.action === 'play') { kickVideo.currentTime = data.time; kickVideo.play(); }
      else if (data.action === 'pause') { kickVideo.currentTime = data.time; kickVideo.pause(); }
      else if (data.action === 'seek') { kickVideo.currentTime = data.time; }
    }

    syncTimeout = setTimeout(() => { isSyncing = false; }, 400);
  }

  async function handleMediaAction(action) {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    
    if (action === 'play') {
      await addToPlaylist(url, true);
      loadMedia(true);
    } else if (action === 'queue') {
      await addToPlaylist(url, true);
      document.getElementById('url-input').value = '';
    }
  }

  async function addToPlaylist(url, broadcast = false) {
    if (!playlist.some(item => item.url === url)) {
      // Zavoláme funkci pro zjištění metadat (titulek, obrázek)
      const newItem = await fetchMetadata(url);
      playlist.push(newItem);
      saveLocalData();
      renderPlaylist();
      if (broadcast) sendSync({ action: 'queue_add', item: newItem });
    }
  }

  function removeFromPlaylist(url, broadcast = false) {
    playlist = playlist.filter(item => item.url !== url);
    saveLocalData();
    renderPlaylist();
    if (broadcast) sendSync({ action: 'queue_remove', url: url });
  }

  function renderPlaylist() {
    const container = document.getElementById('playlist-items');
    container.innerHTML = '';
    const currentUrl = document.getElementById('url-input').value.trim();

    playlist.forEach(item => {
      const div = document.createElement('div');
      div.className = 'playlist-item' + (item.url === currentUrl ? ' active' : '');
      
      // Obrázek
      const thumbDiv = document.createElement('div');
      thumbDiv.className = 'playlist-thumb';
      if (item.thumb) {
        thumbDiv.style.backgroundImage = `url('${item.thumb}')`;
      } else {
        thumbDiv.innerText = 'STREAM';
      }

      // Textové informace
      const infoDiv = document.createElement('div');
      infoDiv.className = 'playlist-info';
      
      const titleSpan = document.createElement('span');
      titleSpan.className = 'playlist-title';
      titleSpan.innerText = item.title;
      
      const urlSpan = document.createElement('span');
      urlSpan.className = 'playlist-url';
      // Zkrácený zobrazený odkaz
      urlSpan.innerText = item.url.length > 40 ? item.url.substring(0, 40) + '...' : item.url;
      
      infoDiv.appendChild(titleSpan);
      infoDiv.appendChild(urlSpan);

      // Tlačítko na smazání
      const removeBtn = document.createElement('button');
      removeBtn.className = 'btn-remove';
      removeBtn.innerHTML = '✖';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        removeFromPlaylist(item.url, true);
      };

      div.appendChild(thumbDiv);
      div.appendChild(infoDiv);
      div.appendChild(removeBtn);

      div.onclick = () => {
        document.getElementById('url-input').value = item.url;
        loadMedia(true);
      };

      container.appendChild(div);
    });
  }

  function loadMedia(broadcast = false) {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    saveLocalData();
    renderPlaylist(); 

    if (broadcast) sendSync({ action: 'load', url: url });

    const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);

    if (ytMatch && ytReady) {
      currentMode = 'yt';
      document.getElementById('layer-kick').classList.remove('active');
      document.getElementById('layer-yt').classList.add('active');
      if (hls) { hls.destroy(); kickVideo.pause(); }
      ytPlayer.loadVideoById(ytMatch[1]);
    } else if (url.endsWith('.m3u8')) {
      currentMode = 'kick';
      document.getElementById('layer-yt').classList.remove('active');
      document.getElementById('layer-kick').classList.add('active');
      if (ytReady) ytPlayer.pauseVideo();

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(kickVideo);
        hls.on(Hls.Events.MANIFEST_PARSED, () => kickVideo.play());
      } else if (kickVideo.canPlayType('application/vnd.apple.mpegurl')) {
        kickVideo.src = url;
        kickVideo.play();
      }
    }
  }

  kickVideo.addEventListener('play', () => sendSync({ action: 'play', time: kickVideo.currentTime }));
  kickVideo.addEventListener('pause', () => sendSync({ action: 'pause', time: kickVideo.currentTime }));
  kickVideo.addEventListener('seeked', () => sendSync({ action: 'seek', time: kickVideo.currentTime }));

  function onYtStateChange(event) {
    if (isSyncing) return;
    const time = ytPlayer.getCurrentTime();
    if (event.data === YT.PlayerState.PLAYING) sendSync({ action: 'play', time: time });
    else if (event.data === YT.PlayerState.PAUSED) sendSync({ action: 'pause', time: time });
  }

  setInterval(() => {
    if (currentMode === 'yt' && ytReady && !isSyncing) {
      const state = ytPlayer.getPlayerState();
      const currentTime = ytPlayer.getCurrentTime();
      if (Math.abs(currentTime - ytLastTime) > 1.5 && (state === YT.PlayerState.PLAYING || state === YT.PlayerState.PAUSED)) {
        sendSync({ action: 'seek', time: currentTime });
      }
      ytLastTime = currentTime;
    }
  }, 500);

</script>
</body>
</html>
