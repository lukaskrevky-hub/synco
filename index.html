<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synco - Naše Kino</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1215; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  .toolbar { background: #161b20; padding: 15px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #242c34; z-index: 10; }
  .group { display: flex; gap: 10px; align-items: center; flex: 1; min-width: 250px; }
  input { background: #080a0c; border: 1px solid #242c34; color: #fff; padding: 8px 12px; border-radius: 6px; flex: 1; outline: none; }
  input:focus { border-color: #5b8dee; }
  input[readonly] { background: #1e252c; color: #7ba4f2; cursor: copy; }
  button { background: #5b8dee; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; white-space: nowrap; }
  button:hover { background: #7ba4f2; }
  
  .status { font-size: 14px; padding: 6px 10px; border-radius: 4px; background: #3d4d5a; white-space: nowrap; }
  .status.connected { background: #4ade80; color: #0d2318; font-weight: bold; }
  .status.error { background: #f87171; color: #230d0d; font-weight: bold; }
  
  .video-container { flex: 1; position: relative; background: #000; }
  .player-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; visibility: hidden; opacity: 0; transition: opacity 0.2s; }
  .player-layer.active { z-index: 2; visibility: visible; opacity: 1; }
  video { width: 100%; height: 100%; outline: none; }
  iframe { width: 100%; height: 100%; border: none; }

  #start-overlay { position: absolute; inset: 0; background: #0f1215; z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .start-box { background: #161b20; border: 1px solid #242c34; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }
  .start-box h2 { color: #5b8dee; margin-bottom: 10px; }
  .start-box p { color: #7d8c99; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
  .start-box button { font-size: 18px; padding: 12px 24px; width: 100%; }
</style>
</head>
<body>

<div id="start-overlay">
  <div class="start-box">
    <h2>Synco Místnost</h2>
    <p>Identifikátor: <strong id="room-name-display" style="color: #fff;"></strong></p>
    <p>Kliknutím vstoupíš do místnosti a aktivuješ synchronizaci zvuku a obrazu.</p>
    <button onclick="startApp()">Vstoupit do místnosti</button>
  </div>
</div>

<div class="toolbar">
  <div class="group">
    <span style="font-size: 13px; color: #7d8c99; white-space: nowrap;">Odkaz:</span>
    <input type="text" id="invite-link" readonly onclick="this.select()">
    <button onclick="copyLink()" id="copy-btn">Kopírovat</button>
  </div>
  
  <div class="group">
    <input type="text" id="url-input" placeholder="Odkaz na YouTube nebo Kick (.m3u8)">
    <button onclick="loadMedia(true)">Pustit video</button>
  </div>
  
  <div class="group" style="flex: 0;">
    <div id="conn-status" class="status">Čekám...</div>
  </div>
</div>

<div class="video-container">
  <div id="layer-yt" class="player-layer">
    <div id="yt-player"></div>
  </div>
  <div id="layer-kick" class="player-layer">
    <video id="kick-player" controls></video>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  let roomName = params.get('room');
  
  if (!roomName) {
    roomName = Math.random().toString(36).substring(2, 8);
    window.history.replaceState(null, '', '?room=' + roomName);
  }

  document.getElementById('room-name-display').innerText = roomName;
  document.getElementById('invite-link').value = window.location.href;

  let peer = null;
  let conn = null;
  let isSyncing = false;
  let currentMode = 'none';
  
  let ytPlayer = null;
  let ytReady = false;
  let ytLastTime = 0;
  
  const kickVideo = document.getElementById('kick-player');
  let hls = null;

  // Konfigurace STUN serverů (Nutné pro spojení různých zařízení!)
  const peerConfig = {
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun.cloudflare.com:3478' }
      ]
    }
  };

  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
      events: {
        'onReady': () => { ytReady = true; },
        'onStateChange': onYtStateChange
      }
    });
  };

  function startApp() {
    document.getElementById('start-overlay').style.display = 'none';
    document.getElementById('conn-status').innerText = 'Vytvářím místnost...';
    document.getElementById('conn-status').className = 'status';

    const hostId = 'synco-room-' + roomName;

    peer = new Peer(hostId, peerConfig);

    peer.on('open', (id) => {
      document.getElementById('conn-status').innerText = 'Čekám na parťáka...';
    });

    peer.on('connection', (c) => {
      setupConnection(c);
      
      setTimeout(() => {
        const currentUrl = document.getElementById('url-input').value.trim();
        if (currentUrl && currentMode !== 'none') {
          sendSync({ action: 'load', url: currentUrl });
          const t = currentMode === 'yt' ? ytPlayer.getCurrentTime() : kickVideo.currentTime;
          sendSync({ action: 'seek', time: t });
        }
      }, 1000);
    });

    peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        document.getElementById('conn-status').innerText = 'Připojuji se do místnosti...';
        
        let guestPeer = new Peer(undefined, peerConfig);
        guestPeer.on('open', () => {
          const c = guestPeer.connect(hostId, { reliable: true });
          setupConnection(c);
          
          c.on('error', () => {
             document.getElementById('conn-status').innerText = 'Chyba připojení!';
             document.getElementById('conn-status').classList.add('error');
          });
        });
      } else {
        console.error(err);
        document.getElementById('conn-status').innerText = 'Chyba sítě!';
        document.getElementById('conn-status').classList.add('error');
      }
    });
  }

  function setupConnection(c) {
    if (conn) conn.close();
    conn = c;
    
    conn.on('open', () => {
      document.getElementById('conn-status').innerText = 'Propojeno s parťákem';
      document.getElementById('conn-status').className = 'status connected';
    });
    
    conn.on('data', handleSyncData);
    
    conn.on('close', () => {
      document.getElementById('conn-status').innerText = 'Parťák se odpojil';
      document.getElementById('conn-status').className = 'status error';
    });
  }

  function sendSync(data) {
    if (conn && conn.open && !isSyncing) {
      conn.send(data);
    }
  }

  function copyLink() {
    const linkInput = document.getElementById('invite-link');
    linkInput.select();
    navigator.clipboard.writeText(linkInput.value);
    const btn = document.getElementById('copy-btn');
    btn.innerText = 'Zkopírováno!';
    setTimeout(() => btn.innerText = 'Kopírovat', 2000);
  }

  function handleSyncData(data) {
    isSyncing = true;

    if (data.action === 'load') {
      document.getElementById('url-input').value = data.url;
      loadMedia(false); 
    }
    
    if (currentMode === 'yt' && ytReady) {
      if (data.action === 'play') { ytPlayer.seekTo(data.time, true); ytPlayer.playVideo(); }
      else if (data.action === 'pause') { ytPlayer.seekTo(data.time, true); ytPlayer.pauseVideo(); }
      else if (data.action === 'seek') { ytPlayer.seekTo(data.time, true); }
    }
    
    if (currentMode === 'kick') {
      if (data.action === 'play') { kickVideo.currentTime = data.time; kickVideo.play(); }
      else if (data.action === 'pause') { kickVideo.currentTime = data.time; kickVideo.pause(); }
      else if (data.action === 'seek') { kickVideo.currentTime = data.time; }
    }

    setTimeout(() => { isSyncing = false; }, 300);
  }

  function loadMedia(broadcast = false) {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    if (broadcast) sendSync({ action: 'load', url: url });

    const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);

    if (ytMatch && ytReady) {
      currentMode = 'yt';
      document.getElementById('layer-kick').classList.remove('active');
      document.getElementById('layer-yt').classList.add('active');
      
      if (hls) { hls.destroy(); kickVideo.pause(); }
      ytPlayer.loadVideoById(ytMatch[1]);
      
    } else if (url.endsWith('.m3u8')) {
      currentMode = 'kick';
      document.getElementById('layer-yt').classList.remove('active');
      document.getElementById('layer-kick').classList.add('active');
      
      if (ytReady) ytPlayer.pauseVideo();

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(kickVideo);
        hls.on(Hls.Events.MANIFEST_PARSED, () => kickVideo.play());
      } else if (kickVideo.canPlayType('application/vnd.apple.mpegurl')) {
        kickVideo.src = url;
        kickVideo.play();
      }
    } else {
      alert("Nepodporovaný odkaz. Vlož YouTube odkaz nebo přímý m3u8 stream.");
    }
  }

  kickVideo.addEventListener('play', () => sendSync({ action: 'play', time: kickVideo.currentTime }));
  kickVideo.addEventListener('pause', () => sendSync({ action: 'pause', time: kickVideo.currentTime }));
  kickVideo.addEventListener('seeked', () => sendSync({ action: 'seek', time: kickVideo.currentTime }));

  function onYtStateChange(event) {
    if (isSyncing) return;
    const time = ytPlayer.getCurrentTime();
    
    if (event.data === YT.PlayerState.PLAYING) {
      sendSync({ action: 'play', time: time });
    } else if (event.data === YT.PlayerState.PAUSED) {
      sendSync({ action: 'pause', time: time });
    }
  }

  setInterval(() => {
    if (currentMode === 'yt' && ytReady && !isSyncing) {
      const state = ytPlayer.getPlayerState();
      const currentTime = ytPlayer.getCurrentTime();
      if (Math.abs(currentTime - ytLastTime) > 1.5 && (state === YT.PlayerState.PLAYING || state === YT.PlayerState.PAUSED)) {
        sendSync({ action: 'seek', time: currentTime });
      }
      ytLastTime = currentTime;
    }
  }, 500);

</script>
</body>
</html>
