<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synco - Společné sledování</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1215; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  /* Horní ovládací panel */
  .toolbar { background: #161b20; padding: 15px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #242c34; z-index: 10; }
  .group { display: flex; gap: 10px; align-items: center; flex: 1; min-width: 250px; }
  input { background: #080a0c; border: 1px solid #242c34; color: #fff; padding: 8px 12px; border-radius: 6px; flex: 1; outline: none; }
  input:focus { border-color: #5b8dee; }
  input[readonly] { background: #1e252c; color: #7ba4f2; cursor: copy; }
  button { background: #5b8dee; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; white-space: nowrap; }
  button:hover { background: #7ba4f2; }
  
  .status { font-size: 14px; padding: 6px 10px; border-radius: 4px; background: #3d4d5a; white-space: nowrap; }
  .status.connected { background: #4ade80; color: #0d2318; font-weight: bold; }
  
  /* Prostor pro videa */
  .video-container { flex: 1; position: relative; background: #000; }
  
  .player-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; visibility: hidden; opacity: 0; transition: opacity 0.2s; }
  .player-layer.active { z-index: 2; visibility: visible; opacity: 1; }
  
  video { width: 100%; height: 100%; outline: none; }
  iframe { width: 100%; height: 100%; border: none; }

  /* Překryvná vrstva pro kamaráda (nutné kvůli Autoplay ochraně prohlížeče) */
  #join-overlay { display: none; position: absolute; inset: 0; background: rgba(8, 10, 12, 0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  #join-overlay h2 { color: #5b8dee; }
  #join-btn { font-size: 18px; padding: 15px 30px; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="group">
    <span style="font-size: 13px; color: #7d8c99; white-space: nowrap;">Pozvánka:</span>
    <input type="text" id="invite-link" readonly value="Generuji odkaz..." onclick="this.select()">
    <button onclick="copyLink()" id="copy-btn">Kopírovat</button>
  </div>
  
  <div class="group">
    <input type="text" id="url-input" placeholder="Odkaz na YouTube nebo Kick (.m3u8)">
    <button onclick="loadMedia(true)">Pustit všem</button>
  </div>
  
  <div class="group" style="flex: 0;">
    <div id="conn-status" class="status">Čekám na připojení...</div>
  </div>
</div>

<div class="video-container">
  <div id="layer-yt" class="player-layer">
    <div id="yt-player"></div>
  </div>
  
  <div id="layer-kick" class="player-layer">
    <video id="kick-player" controls></video>
  </div>

  <div id="join-overlay">
    <h2>Byl jsi pozván ke sledování</h2>
    <p>Pro synchronizaci zvuku a obrazu je nutné kliknout na tlačítko.</p>
    <button id="join-btn" onclick="acceptInvite()">Vstoupit do místnosti</button>
  </div>
</div>

<script>
  // --- STAV A PROMĚNNÉ ---
  let peer = null;
  let conn = null;
  let isSyncing = false;
  let currentMode = 'none';
  
  let ytPlayer = null;
  let ytReady = false;
  let ytLastTime = 0;
  
  const kickVideo = document.getElementById('kick-player');
  let hls = null;

  // Analýza URL pro zjištění, zda jsem host (mám ?room=...) nebo zakladatel
  const urlParams = new URLSearchParams(window.location.search);
  const roomToJoin = urlParams.get('room');

  // --- INICIALIZACE YOUTUBE API ---
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
      events: {
        'onReady': () => { ytReady = true; },
        'onStateChange': onYtStateChange
      }
    });
  };

  // --- LOGIKA PŘIPOJENÍ (PEERJS) ---
  peer = new Peer();
  
  peer.on('open', (id) => {
    if (roomToJoin) {
      // JSEM HOST (Připojuji se ke kamarádovi)
      document.getElementById('invite-link').value = "Jsi připojen jako host";
      document.getElementById('copy-btn').style.display = 'none';
      document.getElementById('join-overlay').style.display = 'flex'; // Zobrazíme výzvu ke vstupu
    } else {
      // JSEM ZAKLADATEL
      const inviteUrl = window.location.origin + window.location.pathname + '?room=' + id;
      document.getElementById('invite-link').value = inviteUrl;
    }
  });

  // Když na můj odkaz někdo klikne (já jsem zakladatel a někdo se připojuje)
  peer.on('connection', (connection) => {
    setupConnection(connection);
    
    // Pokud už něco hraje, pošleme mu to po půl vteřině, ať to má taky
    setTimeout(() => {
      const currentUrl = document.getElementById('url-input').value.trim();
      if (currentUrl && currentMode !== 'none') {
        sendSync({ action: 'load', url: currentUrl });
        
        // Dodatečný sync času
        const t = currentMode === 'yt' ? ytPlayer.getCurrentTime() : kickVideo.currentTime;
        sendSync({ action: 'seek', time: t });
      }
    }, 800);
  });

  // Funkce pro hosta - jakmile klikne na "Vstoupit"
  function acceptInvite() {
    document.getElementById('join-overlay').style.display = 'none';
    document.getElementById('conn-status').innerText = 'Připojuji...';
    const connection = peer.connect(roomToJoin, { reliable: true });
    setupConnection(connection);
  }

  // Společné nastavení spojení pro oba
  function setupConnection(connection) {
    if (conn) conn.close();
    conn = connection;
    
    conn.on('open', () => {
      document.getElementById('conn-status').innerText = 'Propojeno s kamarádem';
      document.getElementById('conn-status').classList.add('connected');
    });
    
    conn.on('data', handleSyncData);
    
    conn.on('close', () => {
      document.getElementById('conn-status').innerText = 'Kamarád se odpojil';
      document.getElementById('conn-status').classList.remove('connected');
    });
  }

  function sendSync(data) {
    if (conn && conn.open && !isSyncing) {
      conn.send(data);
    }
  }

  function copyLink() {
    const linkInput = document.getElementById('invite-link');
    linkInput.select();
    navigator.clipboard.writeText(linkInput.value);
    const btn = document.getElementById('copy-btn');
    btn.innerText = 'Zkopírováno!';
    setTimeout(() => btn.innerText = 'Kopírovat', 2000);
  }

  // --- ZPRACOVÁNÍ PŘÍCHOZÍCH DAT ---
  function handleSyncData(data) {
    isSyncing = true;

    if (data.action === 'load') {
      document.getElementById('url-input').value = data.url;
      loadMedia(false); 
    }
    
    if (currentMode === 'yt' && ytReady) {
      if (data.action === 'play') {
        ytPlayer.seekTo(data.time, true);
        ytPlayer.playVideo();
      } else if (data.action === 'pause') {
        ytPlayer.seekTo(data.time, true);
        ytPlayer.pauseVideo();
      } else if (data.action === 'seek') {
        ytPlayer.seekTo(data.time, true);
      }
    }
    
    if (currentMode === 'kick') {
      if (data.action === 'play') {
        kickVideo.currentTime = data.time;
        kickVideo.play();
      } else if (data.action === 'pause') {
        kickVideo.currentTime = data.time;
        kickVideo.pause();
      } else if (data.action === 'seek') {
        kickVideo.currentTime = data.time;
      }
    }

    setTimeout(() => { isSyncing = false; }, 300);
  }

  // --- PŘEPÍNÁNÍ A NAČÍTÁNÍ VIDEÍ ---
  function loadMedia(broadcast = false) {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    if (broadcast) sendSync({ action: 'load', url: url });

    const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);

    if (ytMatch && ytReady) {
      currentMode = 'yt';
      document.getElementById('layer-kick').classList.remove('active');
      document.getElementById('layer-yt').classList.add('active');
      
      if (hls) { hls.destroy(); kickVideo.pause(); }
      ytPlayer.loadVideoById(ytMatch[1]);
      
    } else if (url.endsWith('.m3u8')) {
      currentMode = 'kick';
      document.getElementById('layer-yt').classList.remove('active');
      document.getElementById('layer-kick').classList.add('active');
      
      if (ytReady) ytPlayer.pauseVideo();

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(kickVideo);
        hls.on(Hls.Events.MANIFEST_PARSED, () => kickVideo.play());
      } else if (kickVideo.canPlayType('application/vnd.apple.mpegurl')) {
        kickVideo.src = url;
        kickVideo.play();
      }
    } else {
      alert("Nepodporovaný odkaz. Vlož YouTube odkaz nebo přímý m3u8 stream.");
    }
  }

  // --- SLEDOVÁNÍ UDÁLOSTÍ: KICK ---
  kickVideo.addEventListener('play', () => sendSync({ action: 'play', time: kickVideo.currentTime }));
  kickVideo.addEventListener('pause', () => sendSync({ action: 'pause', time: kickVideo.currentTime }));
  kickVideo.addEventListener('seeked', () => sendSync({ action: 'seek', time: kickVideo.currentTime }));

  // --- SLEDOVÁNÍ UDÁLOSTÍ: YOUTUBE ---
  function onYtStateChange(event) {
    if (isSyncing) return;
    const time = ytPlayer.getCurrentTime();
    
    if (event.data === YT.PlayerState.PLAYING) {
      sendSync({ action: 'play', time: time });
    } else if (event.data === YT.PlayerState.PAUSED) {
      sendSync({ action: 'pause', time: time });
    }
  }

  setInterval(() => {
    if (currentMode === 'yt' && ytReady && !isSyncing) {
      const state = ytPlayer.getPlayerState();
      const currentTime = ytPlayer.getCurrentTime();
      if (Math.abs(currentTime - ytLastTime) > 1.5 && (state === YT.PlayerState.PLAYING || state === YT.PlayerState.PAUSED)) {
        sendSync({ action: 'seek', time: currentTime });
      }
      ytLastTime = currentTime;
    }
  }, 500);

</script>
</body>
</html>
