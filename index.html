<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synco - Čistá verze</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1215; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  /* Horní ovládací panel */
  .toolbar { background: #161b20; padding: 15px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #242c34; z-index: 10; }
  .group { display: flex; gap: 10px; align-items: center; flex: 1; min-width: 300px; }
  input { background: #080a0c; border: 1px solid #242c34; color: #fff; padding: 8px 12px; border-radius: 6px; flex: 1; outline: none; }
  input:focus { border-color: #5b8dee; }
  button { background: #5b8dee; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  button:hover { background: #7ba4f2; }
  .status { font-size: 14px; padding: 4px 8px; border-radius: 4px; background: #3d4d5a; }
  .status.connected { background: #4ade80; color: #0d2318; }
  
  /* Prostor pro videa */
  .video-container { flex: 1; position: relative; background: #000; }
  
  /* Triky se z-indexem místo display:none, aby se YT nezasekl */
  .player-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; visibility: hidden; opacity: 0; transition: opacity 0.2s; }
  .player-layer.active { z-index: 2; visibility: visible; opacity: 1; }
  
  video { width: 100%; height: 100%; outline: none; }
  iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="group">
    <input type="text" id="url-input" placeholder="Vlož odkaz na YouTube nebo Kick (.m3u8)...">
    <button onclick="loadMedia(true)">Načíst video</button>
  </div>
  
  <div class="group">
    <span style="font-size: 13px; color: #7d8c99;">Moje ID: <strong id="my-id" style="color:#fff; user-select:all;">načítám...</strong></span>
    <input type="text" id="peer-input" placeholder="Vlož ID kamaráda...">
    <button onclick="connectToPeer()">Připojit</button>
    <div id="conn-status" class="status">Odpojeno</div>
  </div>
</div>

<div class="video-container">
  <div id="layer-yt" class="player-layer">
    <div id="yt-player"></div>
  </div>
  
  <div id="layer-kick" class="player-layer">
    <video id="kick-player" controls></video>
  </div>
</div>

<script>
  // --- STAV A PROMĚNNÉ ---
  let peer = null;
  let conn = null;
  let isSyncing = false; // Pojistka proti zacyklení událostí
  let currentMode = 'none'; // 'yt' nebo 'kick'
  
  // YouTube proměnné
  let ytPlayer = null;
  let ytReady = false;
  let ytLastTime = 0;
  
  // Kick proměnné
  const kickVideo = document.getElementById('kick-player');
  let hls = null;

  // --- INICIALIZACE YOUTUBE API ---
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
      events: {
        'onReady': () => { ytReady = true; console.log("YT Player připraven"); },
        'onStateChange': onYtStateChange
      }
    });
  };

  // --- LOGIKA PŘIPOJENÍ (PEERJS) ---
  peer = new Peer();
  peer.on('open', (id) => {
    document.getElementById('my-id').innerText = id;
  });

  // Když se někdo připojí ke mně
  peer.on('connection', (connection) => {
    setupConnection(connection);
  });

  // Když se já připojuji ke kamarádovi
  function connectToPeer() {
    const peerId = document.getElementById('peer-input').value.trim();
    if (!peerId) return alert("Zadej ID kamaráda");
    const connection = peer.connect(peerId, { reliable: true });
    setupConnection(connection);
  }

  function setupConnection(connection) {
    if (conn) conn.close();
    conn = connection;
    
    conn.on('open', () => {
      document.getElementById('conn-status').innerText = 'Připojeno';
      document.getElementById('conn-status').classList.add('connected');
    });
    
    conn.on('data', handleSyncData);
    
    conn.on('close', () => {
      document.getElementById('conn-status').innerText = 'Odpojeno';
      document.getElementById('conn-status').classList.remove('connected');
    });
  }

  function sendSync(data) {
    if (conn && conn.open && !isSyncing) {
      conn.send(data);
    }
  }

  // --- ZPRACOVÁNÍ PŘÍCHOZÍCH DAT ---
  function handleSyncData(data) {
    isSyncing = true; // Zapneme pojistku, abychom odesílateli neposlali jeho vlastní akci zpět

    if (data.action === 'load') {
      document.getElementById('url-input').value = data.url;
      loadMedia(false); // false = neposílat znovu kamarádovi
    }
    
    // YouTube synchronizace
    if (currentMode === 'yt' && ytReady) {
      if (data.action === 'play') {
        ytPlayer.seekTo(data.time, true);
        ytPlayer.playVideo();
      } else if (data.action === 'pause') {
        ytPlayer.seekTo(data.time, true);
        ytPlayer.pauseVideo();
      } else if (data.action === 'seek') {
        ytPlayer.seekTo(data.time, true);
      }
    }
    
    // Kick synchronizace
    if (currentMode === 'kick') {
      if (data.action === 'play') {
        kickVideo.currentTime = data.time;
        kickVideo.play();
      } else if (data.action === 'pause') {
        kickVideo.currentTime = data.time;
        kickVideo.pause();
      } else if (data.action === 'seek') {
        kickVideo.currentTime = data.time;
      }
    }

    // Vypnutí pojistky po krátké prodlevě
    setTimeout(() => { isSyncing = false; }, 300);
  }

  // --- PŘEPÍNÁNÍ A NAČÍTÁNÍ VIDEÍ ---
  function loadMedia(broadcast = false) {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    if (broadcast) {
      sendSync({ action: 'load', url: url });
    }

    const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);

    if (ytMatch && ytReady) {
      // Je to YouTube
      currentMode = 'yt';
      document.getElementById('layer-kick').classList.remove('active');
      document.getElementById('layer-yt').classList.add('active');
      
      if (hls) { hls.destroy(); kickVideo.pause(); }
      
      ytPlayer.loadVideoById(ytMatch[1]);
      
    } else if (url.endsWith('.m3u8')) {
      // Je to Kick / HLS
      currentMode = 'kick';
      document.getElementById('layer-yt').classList.remove('active');
      document.getElementById('layer-kick').classList.add('active');
      
      if (ytReady) ytPlayer.pauseVideo();

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(kickVideo);
        hls.on(Hls.Events.MANIFEST_PARSED, () => kickVideo.play());
      } else if (kickVideo.canPlayType('application/vnd.apple.mpegurl')) {
        kickVideo.src = url;
        kickVideo.play();
      }
    } else {
      alert("Nepodporovaný odkaz. Vlož YouTube odkaz nebo přímý m3u8 stream.");
    }
  }

  // --- SLEDOVÁNÍ UDÁLOSTÍ: KICK ---
  kickVideo.addEventListener('play', () => sendSync({ action: 'play', time: kickVideo.currentTime }));
  kickVideo.addEventListener('pause', () => sendSync({ action: 'pause', time: kickVideo.currentTime }));
  kickVideo.addEventListener('seeked', () => sendSync({ action: 'seek', time: kickVideo.currentTime }));

  // --- SLEDOVÁNÍ UDÁLOSTÍ: YOUTUBE ---
  function onYtStateChange(event) {
    if (isSyncing) return;
    const time = ytPlayer.getCurrentTime();
    
    if (event.data === YT.PlayerState.PLAYING) {
      sendSync({ action: 'play', time: time });
    } else if (event.data === YT.PlayerState.PAUSED) {
      sendSync({ action: 'pause', time: time });
    }
  }

  // Detekce přetáčení u YouTube (YouTube nemá nativní událost "seeked", musíme to hlídat v intervalu)
  setInterval(() => {
    if (currentMode === 'yt' && ytReady && !isSyncing) {
      const state = ytPlayer.getPlayerState();
      const currentTime = ytPlayer.getCurrentTime();
      
      // Pokud se čas skokově změní o více než 1.5 sekundy a zrovna video hraje nebo je pozastavené
      if (Math.abs(currentTime - ytLastTime) > 1.5 && (state === YT.PlayerState.PLAYING || state === YT.PlayerState.PAUSED)) {
        sendSync({ action: 'seek', time: currentTime });
      }
      ytLastTime = currentTime;
    }
  }, 500);

</script>
</body>
</html>
